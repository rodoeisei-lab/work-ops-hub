<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>GC当日プラン | 作業用ミニハブ</title>
  <link rel="stylesheet" href="assets/css/common.css">
  <link rel="stylesheet" href="assets/css/gc-day-plan.css">
</head>
<body>
  <main class="wrap day-plan-page">
    <header class="card section-block">
      <h1>GC当日プラン</h1>
      <p>匿名コード（A01 など）ごとに対象物質を入力し、1台運用候補か複数台検討かを確認します。</p>
      <p class="hint">単体の条件探索は <a href="gc-method-finder.html">GC条件提案</a> を利用してください。</p>
    </header>

    <section class="card section-block">
      <h2>1. 基本設定</h2>
      <div class="top-grid">
        <label>GC開始時刻<input id="gcStartTime" type="time" value="13:00"></label>
        <label>段取り余裕時間（1単位あたり min）<input id="setupBufferInput" type="number" min="0" step="0.1" value="1.0"></label>
      </div>
    </section>

    <section class="card section-block">
      <h2>2. 単位作業場所</h2>
      <div id="workplaceCards" class="workplace-list"></div>
      <div class="action-row">
        <button id="addWorkplaceBtn" type="button" class="plain">作業場を追加</button>
        <button id="suggestAllBtn" type="button" class="primary">まとめて候補提案</button>
      </div>
    </section>

    <section class="card section-block">
      <h2>3. 全体プラン</h2>
      <div id="planSummary" class="summary-box">作業場入力後に「まとめて候補提案」を押してください。</div>
    </section>

    <section class="card section-block">
      <h2>4. 作業場別詳細</h2>
      <div id="planDetails" class="details-list"></div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/gc-day-plan.js" defer></script>
</body>
</html>
